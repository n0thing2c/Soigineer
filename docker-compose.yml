
networks:
  soigineer_net:
    driver: bridge

volumes:
  redpanda_data:
  clickhouse_data:

services:
  # ==========================================
  # REDPANDA BROKER 
  # ==========================================
  redpanda-broker:
    image: docker.io/redpandadata/redpanda:v25.3.15
    container_name: redpanda-broker
    networks:
      - soigineer_net
    ports:
      - "${REDPANDA_EXTERNAL_PORT:-19092}:19092" # Port cho máy tính (Host) gọi vào Redpanda
      - "9644:9644"   # Port quản trị Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --mode=dev-container # Bật chế độ Dev: Tự động bỏ qua các giới hạn phần cứng khắt khe
      - --memory 1G
      - --smp 1
      # ĐỊNH NGHĨA CÁC CỔNG LẮNG NGHE (Lắng nghe ở đâu?)
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      # ĐỊNH NGHĨA ĐỊA CHỈ QUẢNG BÁ (Báo cho Client biết gọi vào đâu?)
      - --advertise-kafka-addr=internal://redpanda-broker:9092,external://localhost:19092
    
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "127.0.0.1:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ==========================================
  # REDPANDA CONSOLE
  # ==========================================
  redpanda-console:
    image: docker.io/redpandadata/console:v2.8.5
    container_name: redpanda-console
    restart: always
    networks:
      - soigineer_net
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: "redpanda-broker:9092"
    depends_on:
      redpanda-broker:
        condition: service_healthy 

  # ==========================================
  # TẠO TOPIC TỰ ĐỘNG 
  # ==========================================
  redpanda-init:
    image: docker.io/redpandadata/redpanda:v25.3.15
    container_name: redpanda-topic-creator
    networks:
      - soigineer_net
    depends_on:
      redpanda-broker:
        condition: service_healthy
    # Chờ Redpanda khởi động xong, sau đó dùng CLI (rpk) để tạo topic
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        rpk topic create raw-logs --brokers redpanda-broker:9092 --partitions 3 --replicas 1 --topic-config retention.ms=259200000 || true

  # ==========================================
  # INGESTION GATEWAY
  # ==========================================
  ingestion-gateway:
    build: 
      context: ./backend
      dockerfile: internal/ingestion-gateway/Dockerfile
    container_name: ingestion-gateway
    networks:
      - soigineer_net
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - REDPANDA_BROKERS=redpanda-broker:9092 
      - GIN_MODE=release
    depends_on:
      redpanda-init:
        condition: service_completed_successfully

 # ==========================================
  # CLICK HOUSE DB
  # ==========================================

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    networks:
      - soigineer_net

    ports:
      - "8123:8123"
      - "9000:9000"
    
    environment:
      CLICKHOUSE_DB: logs_db
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: secret123

    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 1G

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

 # ==========================================
  # Processor
  # ==========================================
  logs-processor:
    build: 
      context: ./backend
      dockerfile: internal/processing/Dockerfile
    container_name: logs-processor
    networks:
      - soigineer_net
    environment:
      REDPANDA_BROKERS: redpanda-broker:9092
      REDPANDA_RAW_LOGS_TOPIC: raw-logs

      CLICKHOUSE_DB: logs_db
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: secret123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000

    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
